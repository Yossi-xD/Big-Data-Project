networks:
  bigdata_net:
    external: true

volumes:
  minio_data:
  iceberg_catalog_data:
  ivy2_cache:
    # Explicit "name:" pins the literal Docker volume name (otherwise Compose
    # prefixes it with the project name). Airflow's DockerOperator references
    # this exact name directly via the Docker daemon, bypassing Compose entirely,
    # so the name must be predictable. Shared Spark package cache (e.g. the Kafka
    # connector) reused by the long-lived spark-iceberg container AND every
    # ephemeral Airflow task container so packages only download once.
    name: ivy2_cache

services:
  # --- Data Lake storage (MinIO, S3-compatible) ---
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password12345
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console
    volumes:
      - minio_data:/data
    networks:
      - bigdata_net
    restart: unless-stopped

  # One-shot: creates the "warehouse" bucket + bronze/silver/gold prefixes, creates
  # the "landing" bucket, and uploads anything dropped in ./seed_data (Tama's raw
  # batch source files -- reviews, etc.) so batch jobs have real input
  # data to read from day one instead of a local container filesystem path.
  mc-init:
    image: minio/mc:RELEASE.2024-01-13T08-44-48Z
    container_name: mc-init
    depends_on:
      - minio
    volumes:
      - ./seed_data:/seed_data:ro
      - ./mc-init.sh:/mc-init.sh:ro
    networks:
      - bigdata_net
    entrypoint: ["/bin/sh", "/mc-init.sh"]
    restart: "no"

  # --- Iceberg REST catalog (no Hive Metastore) ---
  iceberg-rest:
    image: tabulario/iceberg-rest:1.6.0
    container_name: iceberg-rest
    depends_on:
      - minio
    ports:
      - "8181:8181"
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password12345
      AWS_REGION: us-east-1
      CATALOG_URI: jdbc:sqlite:/home/iceberg/iceberg_catalog.db
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH-STYLE-ACCESS: "true"
    networks:
      - bigdata_net
    restart: unless-stopped
    volumes:
      - iceberg_catalog_data:/home/iceberg
  # --- Spark runtime (Spark + Iceberg + hadoop-aws) ---
  # This is the ONLY image Spark jobs ever run from: the long-lived container below
  # (for manual inspection / demo) and every Airflow DockerOperator task (ephemeral,
  # one container per task run) both use this same "processing-spark:latest" image.
  spark-iceberg:
    build:
      context: .
    image: processing-spark:latest
    container_name: spark-iceberg
    depends_on:
      - iceberg-rest
      - minio
    environment:
      AWS_REGION: us-east-1
    ports:
      - "4040:4040" # Spark UI (visible while a job is running)
    volumes:
      - ivy2_cache:/opt/processing/.ivy2
    networks:
      - bigdata_net
    command: ["tail", "-f", "/dev/null"] # idle container kept alive for docker exec / demo inspection
    restart: unless-stopped

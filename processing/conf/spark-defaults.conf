# Iceberg REST catalog (no Hive Metastore) backed by the MinIO "warehouse" bucket.
# Namespaces bronze / silver / gold map 1:1 to the bronze/silver/gold folder
# structure required by the assignment (Iceberg creates warehouse/<namespace>/<table>/
# under the bucket automatically the first time a table is written).
spark.sql.extensions                           org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.lake                         org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.lake.catalog-impl            org.apache.iceberg.rest.RESTCatalog
spark.sql.catalog.lake.uri                     http://iceberg-rest:8181
spark.sql.catalog.lake.io-impl                 org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.lake.warehouse               s3://warehouse/
spark.sql.catalog.lake.s3.endpoint             http://minio:9000
spark.sql.catalog.lake.s3.path-style-access    true
spark.sql.catalog.lake.s3.access-key-id        admin
spark.sql.catalog.lake.s3.secret-access-key    password12345
spark.sql.catalog.lake.client.region           us-east-1
spark.sql.defaultCatalog                       lake

# Kafka structured streaming jobs read/write through this same Spark session.
spark.hadoop.fs.s3a.endpoint                   http://minio:9000
spark.hadoop.fs.s3a.access.key                  admin
spark.hadoop.fs.s3a.secret.key                  password12345
spark.hadoop.fs.s3a.path.style.access           true
spark.hadoop.fs.s3a.impl                        org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled      false

spark.eventLog.enabled                          false
spark.sql.shuffle.partitions                    4
spark.master                                    local[*]

# Kafka connector is resolved via Ivy on first use (not pre-baked into the image
# like Iceberg/hadoop-aws, to avoid guessing transitive dependency versions).
# spark.jars.ivy points at a volume ("ivy2_cache") shared by every Spark container
# -- including Airflow's ephemeral DockerOperator ones -- so it's only downloaded once.
spark.jars.packages                             org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1
spark.jars.ivy                                  /opt/processing/.ivy2


networks:
  bigdata_net:
    external: true

volumes:
  kafka_data:

services:
  # --- Kafka (KRaft mode, single combined broker+controller node, no Zookeeper) ---
  kafka:
    image: apache/kafka:3.9.2
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
    ports:
      - "29092:29092" # reachable from the host machine (e.g. a local Kafka client)
    volumes:
      - kafka_data:/var/lib/kafka/data
    tmpfs:
      - /etc/kafka/secrets:mode=0777
      - /mnt/shared/config:mode=0777
    networks:
      - bigdata_net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 15
    restart: unless-stopped

  # One-shot: explicitly creates the orders_stream topic (rather than relying on auto-create).
  kafka-init:
    image: apache/kafka:3.9.2
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - bigdata_net
    tmpfs:
      - /etc/kafka/secrets:mode=0777
      - /mnt/shared/config:mode=0777
      - /var/lib/kafka/data:mode=0777
    entrypoint: >
      /bin/bash -c "
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic orders_stream --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --describe --topic orders_stream
      "
    restart: "no"

  # Optional: visual topic/message inspection during the demo video.
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - bigdata_net
    restart: unless-stopped

  orders-producer:
    build:
      context: ./producer
    container_name: orders-producer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: orders_stream
      MESSAGES_PER_SECOND: "2"
      LATE_RATIO: "0.15"
      MAX_LATE_HOURS: "48"
    networks:
      - bigdata_net
    restart: unless-stopped
